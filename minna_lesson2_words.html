.section-nav {

.sec-btn {

.emoji { font-size: 48px; margin-bottom: 10px; line-height: 1; }
.hira {

.hira.longmed { font-size: 36px; }
.kanji {

.audio-btn:hover { background: #28B4A6; transform: scale(1.08); }
.audio-btn:active { transform: scale(0.95); }
.audio-btn svg { width: 22px; height: 22px; fill: white; }
.audio-btn.playing {
  background: #28B4A6;
  animation: pulse 0.6s ease-in-out infinite alternate;
}
@keyframes pulse {
  from { box-shadow: 0 4px 12px rgba(40,180,166,0.3); }
  to { box-shadow: 0 4px 28px rgba(40,180,166,0.7); }
}
.nav { display: flex; align-items: center; gap: 14px; margin-top: 18px; justify-content: center; }
.nav-btn {

.counter span { color: white; font-weight: 700; font-size: 17px; }

.progress-fill {

let cur = 0;
let currentAudio = null;

function render() {
  const [num, hira, kanji, korean, emoji, section] = words[cur];
  document.getElementById('emoji').textContent = emoji;

  const hiraEl = document.getElementById('hira');
  hiraEl.textContent = hira;
  const hiraLen = hira.replace(/\n/g,'').length;
  hiraEl.className = 'hira' +
    (hiraLen > 14 ? ' long' :
     hiraLen > 10 ? ' longmed' :
     hiraLen > 7  ? ' medium' : '');

  const kanjiEl = document.getElementById('kanji');
  if (kanji) {
    kanjiEl.textContent = kanji;
    kanjiEl.style.display = 'block';
  } else {
    kanjiEl.style.display = 'none';
  }

  const korEl = document.getElementById('korean');
  korEl.textContent = korean;
  korEl.className = 'korean' + (korean.length > 12 ? ' long' : '');

  document.getElementById('cur').textContent = num;
  document.getElementById('progress').style.width = (num / 37 * 100) + '%';
  document.getElementById('prev-btn').disabled = cur === 0;
  document.getElementById('next-btn').disabled = cur === words.length - 1;
  document.getElementById('audio-btn').classList.remove('playing');

  setTimeout(playAudio, 250);
}

function playAudio() {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  const num = words[cur][0];
  if (!audioData[String(num)]) return;
  const btn = document.getElementById('audio-btn');
  btn.classList.add('playing');
  currentAudio = new Audio('data:audio/mpeg;base64,' + audioData[String(num)]);
  currentAudio.play();
  currentAudio.onended = () => { btn.classList.remove('playing'); currentAudio = null; };
}

function next() { if (cur < words.length - 1) { cur++; render(); } }
function prev() { if (cur > 0) { cur--; render(); } }

function jumpTo(idx, btn) {
  cur = idx; render();
  document.querySelectorAll('.sec-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
  else if (e.key === 'r' || e.key === 'R') playAudio();
});

render();
</script>
